<script>
const PERFIL_DEFAULT = { sexo: 'M', edad: 47, altura: 188, pesoInicial: 95 };
const P = () => ({ ...PERFIL_DEFAULT, ...(data.perfil || {}) });
const tmb = p => {
  const per = P();
  // Mifflin-St Jeor: hombres +5, mujeres -161
  const offset = per.sexo === 'F' ? -161 : 5;
  return Math.round(10*p + 6.25*per.altura - 5*per.edad + offset);
};
const get = (p, factor) => Math.round(tmb(p) * factor);

const FACTORES_ACTIVIDAD = [
  { id:'sedentario', factor:1.2, titulo:'Sedentario', desc:'Trabajo de oficina, poco movimiento. Sin ejercicio o muy poco.' },
  { id:'ligero', factor:1.375, titulo:'Actividad ligera', desc:'Ejercicio suave 1-3 días/semana, vida poco activa fuera del gimnasio.' },
  { id:'moderado', factor:1.55, titulo:'Actividad moderada', desc:'Ejercicio 3-5 días/semana. Trabajo de oficina con algo de movimiento.' },
  { id:'activo', factor:1.725, titulo:'Muy activo', desc:'Ejercicio intenso 6-7 días/semana o trabajo físico.' },
  { id:'extremo', factor:1.9, titulo:'Extremadamente activo', desc:'Ejercicio muy intenso a diario o trabajo físico muy duro + ejercicio.' },
];

const QUICK = [
  { id:'naranja', n:'Naranja', k:70, e:'🍊', q:'1 ud (~150 g)' },
  { id:'banana_m', n:'½ Plátano grande', k:67, e:'🍌', q:'~75 g' },
  { id:'banana', n:'Plátano entero', k:135, e:'🍌', q:'~150 g' },
  { id:'tostada', n:'Tostada pan semillas', k:90, e:'🍞', q:'10 mm ~33 g' },
  { id:'aove', n:'AOVE (cucharadita)', k:45, e:'🫒', q:'~5 ml' },

// Mensajes personalizados según contexto (devuelven mensaje o null)
function mensajePersonalizado(date) {
  const dia = data.dias[date];
  if (!dia) return null;
  const d = new Date(date+'T12:00:00');
  const dow = d.getDay();
  const hoy = new Date();
  const esHoy = date === todayKey();

  if (esHoy && dow === 4) return { i:'🥊', t:'Hoy toca jueves bestia: BODY SPAR + BODYBOX. A reventarlo, Carmelo.' };
  if (esHoy && dow === 1) return { i:'⚡', t:'Lunes con HIT y FITPOWER. Empezamos la semana fuerte.' };
  if (esHoy && dow === 5) return { i:'🎉', t:'Viernes. Última sesión de la semana, dale con todo.' };
  if (esHoy && (dow === 0 || dow === 6)) return { i:'🧘', t:'Día de descanso. Recuperar también es entrenar.' };

  // Si lleva varios días en déficit
  const ultimos = [];
  for (let i=0; i<3; i++) {
    const dd = new Date(date+'T12:00:00');
    dd.setDate(dd.getDate() - i);
    const k = dd.toISOString().slice(0,10);
    if (data.dias[k]) {
      const ing = ['desayuno','comida','cena','otros'].reduce((s,c) => s + (data.dias[k][c]||[]).reduce((ss,x) => ss + (x.kcal||0), 0), 0);
      const p = data.dias[k].peso || P().pesoInicial;
      const ej = (data.dias[k].ejercicio||[]).reduce((s,e) => s + kcalEjer(e.met,e.duracion,p), 0);
      const bal = ing - (get(p, data.factorActividad||1.55) + ej);
      ultimos.push(bal);
    }
  }
  if (ultimos.length === 3 && ultimos.every(b => b < 0)) {
    return { i:'🔥', t:'Llevas 3 días seguidos en déficit. Vas como un tren, sigue así.' };
  }
  return null;
}

function mensajeDelDia(date) {
  const personal = mensajePersonalizado(date);
  if (personal && Math.random() < 0.6) return personal;
  // Hash del día → mensaje fijo para ese día
  let hash = 0;
  for (let i = 0; i < date.length; i++) hash = (hash * 31 + date.charCodeAt(i)) >>> 0;
  return MENSAJES_ANIMO[hash % MENSAJES_ANIMO.length];
}

function renderPeso() {
  const series = Object.entries(data.dias).filter(([_,d]) => d.peso != null).map(([k,d]) => ({fecha:fmt(k), peso:d.peso, raw:k, foto:d.foto})).sort((a,b) => a.raw.localeCompare(b.raw));
  const ult = series.length > 0 ? series[series.length-1].peso : P().pesoInicial;
  const delta = +(ult - P().pesoInicial).toFixed(1);
  const deltaCls = delta < 0 ? 'down' : delta > 0 ? 'up' : 'same';
  const msg = mensajeDelDia(todayKey());

  let chart = '<div class="empty" style="padding:80px 0">Añade al menos 2 registros de peso para ver la evolución</div>';
  if (series.length >= 2) {
    const W = 400, H = 220, PAD = 40;
    const ys = series.map(s => s.peso);
    const minY = Math.min(...ys, P().pesoInicial) - 0.5;
    const maxY = Math.max(...ys, P().pesoInicial) + 0.5;
    const xStep = (W - 2*PAD) / Math.max(1, series.length - 1);
    const scaleY = v => H - PAD - ((v - minY) / (maxY - minY)) * (H - 2*PAD);
    const path = series.map((s,i) => (i===0?'M':'L')+' '+(PAD + i*xStep)+' '+scaleY(s.peso)).join(' ');
    const dots = series.map((s,i) => '<circle class="cdot" cx="'+(PAD + i*xStep)+'" cy="'+scaleY(s.peso)+'" r="4.5"/>').join('');
    const step = Math.max(1, Math.ceil(series.length/6));
    const labels = series.map((s,i) => {
      if (i % step !== 0 && i !== series.length-1) return '';
      return '<text x="'+(PAD + i*xStep)+'" y="'+(H-12)+'" text-anchor="middle">'+s.fecha+'</text>';
    }).join('');
    const refY = scaleY(P().pesoInicial);
    const yMarks = [minY, (minY+maxY)/2, maxY].map(v =>
      '<line class="grid" x1="'+PAD+'" y1="'+scaleY(v)+'" x2="'+(W-PAD)+'" y2="'+scaleY(v)+'"/>'+
      '<text x="'+(PAD-6)+'" y="'+(scaleY(v)+3)+'" text-anchor="end">'+v.toFixed(1)+'</text>'
    ).join('');
    chart = '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
      yMarks+
      '<line class="ref" x1="'+PAD+'" y1="'+refY+'" x2="'+(W-PAD)+'" y2="'+refY+'"/>'+
      '<path class="cline" d="'+path+'"/>'+dots+labels+
    '</svg>';
  }

  const fotosSerie = series.filter(s => s.foto);
  const fotosHTML = fotosSerie.map(s =>
    '<div class="photo-card">'+
      '<button class="photo-delete" onclick="deletePhoto(\''+s.raw+'\')">×</button>'+
      '<img src="'+s.foto+'" alt="foto '+s.fecha+'">'+
      '<div class="photo-card-label"><div class="photo-card-date">'+s.fecha+'</div><div class="photo-card-peso">'+s.peso+' kg</div></div>'+
    '</div>'
  ).join('');

  document.getElementById('tab-peso').innerHTML =
    '<div class="peso-hero"><div class="peso-label">Peso actual</div>'+
    '<div class="peso-value" id="peso-anim" data-target="'+ult+'">0.0 <span class="peso-unit">kg</span></div>'+
    '<div class="peso-delta '+deltaCls+'" id="peso-delta-anim">'+(delta>0?'+':'')+delta+' kg desde el inicio</div></div>'+
    '<div class="motivational" id="motivational"><div class="motiv-icon">'+msg.i+'</div><div class="motiv-text">'+esc(msg.t)+'</div></div>'+
    '<div class="section"><div class="section-h"><div class="section-h-left"><div class="sec-icon balance">📈</div><span class="section-t-main">Evolución del peso</span></div></div><div class="chart-wrap">'+chart+'</div></div>'+
    '<div class="section"><div class="section-h"><div class="section-h-left"><div class="sec-icon comida">📷</div><span class="section-t-main">Fotos de evolución</span></div></div>'+
    '<p style="font-size:13px;color:#6b7280;margin-bottom:8px">Sube una foto en el día que estés registrando para ver tu cambio físico.</p>'+
    '<div class="photo-gallery">'+
      '<label class="photo-add"><span class="photo-add-icon">＋</span>Añadir foto<input type="file" accept="image/*" capture="environment" onchange="addPhoto(event)" style="display:none"></label>'+
      fotosHTML+
    '</div></div>'+
    '<div class="section"><div class="section-h"><div class="section-h-left"><div class="sec-icon peso">📋</div><span class="section-t-main">Histórico de peso</span></div><span class="section-t" style="color:#6b7280">'+series.length+'</span></div>'+
    series.slice().reverse().map(s =>
      '<div class="item"><div style="flex:1"><div class="item-name">'+s.fecha+'</div></div><div style="font-size:17px;color:#196bc7;font-weight:600">'+s.peso+' kg</div></div>'
    ).join('')+'</div>';

  // Animación al entrar
  setTimeout(() => {
    const el = document.getElementById('peso-anim');
    if (!el) return;
    const target = parseFloat(el.dataset.target);
    const duration = 900;
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = (target * eased).toFixed(1);
      el.innerHTML = val + ' <span class="peso-unit">kg</span>';
      if (t < 1) requestAnimationFrame(tick);
      else el.innerHTML = target + ' <span class="peso-unit">kg</span>';
    };
    el.classList.add('show');
    requestAnimationFrame(tick);
    setTimeout(() => document.getElementById('peso-delta-anim').classList.add('show'), 100);
    setTimeout(() => document.getElementById('motivational').classList.add('show'), 200);
  }, 50);
}

    '<p class="help-text" style="margin-bottom:4px">Selecciona el nivel de actividad que MEJOR describa tu día a día. Puedes cambiarlo cuando tu rutina cambie.</p>'+
    '<div class="activity-selector">'+activityHTML+'</div>'+
    '<p class="help-text" style="margin-top:14px;font-size:13px;color:#6b7280"><b>Importante:</b> aunque elijas un factor que ya cuenta el ejercicio, las kcal del gimnasio del día se suman aparte. Para evitar contar dos veces, al gasto del entrenamiento le resto un MET basal automáticamente.</p></div>'+

    '<div class="section"><div class="section-h"><div class="section-h-left"><div class="sec-icon otros">💾</div><span class="section-t-main">Gestión de datos</span></div></div>'+
    '<button class="btn-primary" onclick="exportJSON()">Exportar datos (JSON)</button>'+
    '<label class="btn-secondary">Importar datos<input type="file" accept=".json,application/json" onchange="importJSON(event)" style="display:none"></label>'+
    '<button class="btn-danger" onclick="resetAll()">Borrar todos los datos</button></div>'+

    '<div class="section"><div class="section-h"><div class="section-h-left"><div class="sec-icon cena">ℹ️</div><span class="section-t-main">Acerca de la aplicación</span></div></div>'+
    '<p class="help-text">Aplicación de uso personal sin conexión. Los datos se almacenan localmente en el dispositivo. Para transferir entre dispositivos, exporte el archivo JSON e impórtelo en el otro.</p></div>'+
    '<div class="section" style="opacity:0.6;font-size:12px;text-align:center;padding:14px;color:#6b7280">Seguimiento de Dieta · versión 1.2</div>';
}

function showInfo(tipo) {
  const factor = data.factorActividad || 1.55;
  const ft = FACTORES_ACTIVIDAD.find(f => f.factor === factor);
  let title = '', body = '';

  if (tipo === 'tmb') {
    title = 'Metabolismo basal (TMB)';
    body =
      '<div class="info-section">'+
        '<div class="info-title">¿Qué es?</div>'+
        '<div class="info-text">Es la energía mínima que tu cuerpo necesita en <b>reposo absoluto</b> solo para mantenerte vivo: respirar, bombear sangre, mantener la temperatura corporal, función de órganos, regeneración celular, etc.</div>'+
        '<div class="info-text" style="margin-top:8px">Imagina estar 24 h en la cama sin moverte: aun así quemarías esta cantidad de energía.</div>'+
      '</div>'+
      '<div class="info-section">'+
        '<div class="info-title">¿Cómo se calcula?</div>'+
        '<div class="info-text">Uso la fórmula <b>Mifflin-St Jeor</b>, la más precisa para población general:</div>'+
        '<div class="info-formula">TMB = 10 × peso(kg) + 6,25 × altura(cm) − 5 × edad '+(P().sexo==='F'?'− 161':'+ 5')+'</div>'+
        '<div class="info-text">Para tu caso ('+P().pesoInicial+' kg · '+P().altura+' cm · '+P().edad+' años · '+(P().sexo==='F'?'mujer':'hombre')+'):</div>'+
        '<div class="info-formula">10×'+P().pesoInicial+' + 6,25×'+P().altura+' − 5×'+P().edad+' '+(P().sexo==='F'?'− 161':'+ 5')+' = '+tmb(P().pesoInicial)+' kcal/día</div>'+
      '</div>'+
      '<div class="info-section">'+
        '<div class="info-title">Importante</div>'+
        '<div class="info-text">El TMB <b>NO incluye</b> ni el ejercicio físico, ni el trabajo, ni los desplazamientos. Solo lo mínimo vital.</div>'+
      '</div>';
  } else {
    title = 'Gasto total estimado (GET)';
    body =
      '<div class="info-section">'+
        '<div class="info-title">¿Qué es?</div>'+
        '<div class="info-text">Es tu gasto calórico de un día habitual <b>sin contar el entrenamiento específico de gimnasio</b>. Incluye:</div>'+
        '<ul class="info-list"><li>Tu metabolismo basal (TMB)</li><li>Trabajo y actividad profesional</li><li>Desplazamientos y caminar</li><li>Tareas domésticas y movimiento general</li><li>Digestión (efecto térmico de los alimentos)</li></ul>'+
      '</div>'+
      '<div class="info-section">'+
        '<div class="info-title">¿Cómo se calcula?</div>'+
        '<div class="info-formula">GET = TMB × factor de actividad</div>'+
        '<div class="info-text">El factor depende de tu vida diaria. Actualmente tienes seleccionado:</div>'+
        '<div class="info-formula"><b>'+ft.titulo+'</b> (×'+ft.factor+')<br>'+ft.desc+'</div>'+
        '<div class="info-text">Tu GET actual:</div>'+
        '<div class="info-formula">'+tmb(P().pesoInicial)+' × '+ft.factor+' = '+get(P().pesoInicial, ft.factor)+' kcal/día</div>'+
      '</div>'+
      '<div class="info-section">'+
        '<div class="info-title">¿Y el gimnasio?</div>'+
        '<div class="info-text">El ejercicio del gimnasio se calcula APARTE y se suma encima del GET en el balance diario. <b>Para no contarlo dos veces</b>, al gasto del entreno le resto un MET (el basal que ya está incluido en el GET).</div>'+
        '<div class="info-formula">Gasto total del día = GET + Ejercicio neto</div>'+
      '</div>';
  }
  document.getElementById('info-title').textContent = title;
  document.getElementById('info-body').innerHTML = body;
  document.getElementById('info-modal').classList.remove('hidden');
}

function closeInfoModal() { document.getElementById('info-modal').classList.add('hidden'); }

function setFactor(f) {
  data.factorActividad = f;
  save(); renderAll();
}

function setPerfil(campo, valor) {
  if (!data.perfil) data.perfil = {};
  if (campo === 'sexo') {
    data.perfil.sexo = valor;
  } else {
    const n = parseFloat(valor);
    if (isNaN(n)) return;
    // Validaciones
    if (campo === 'edad' && (n < 14 || n > 100)) { alert('La edad debe estar entre 14 y 100 años.'); renderAjustes(); return; }
    if (campo === 'altura' && (n < 120 || n > 220)) { alert('La altura debe estar entre 120 y 220 cm.'); renderAjustes(); return; }
    if (campo === 'pesoInicial' && (n < 30 || n > 250)) { alert('El peso debe estar entre 30 y 250 kg.'); renderAjustes(); return; }
    data.perfil[campo] = (campo === 'pesoInicial') ? n : Math.round(n);
  }
  save(); renderAll();
}

function renderAll() { renderHoy(); renderPeso(); renderHistorial(); renderAjustes(); }

function changeDate(delta) {
  const d = new Date(selectedDate+'T12:00:00');
  d.setDate(d.getDate() + delta);
  selectedDate = d.toISOString().slice(0,10);
  renderHoy();
}

function setPeso(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return;
  const d = ensureDay(selectedDate);
  d.peso = n;
  save(); renderAll();
}

function loadRutina() {
  const r = RUTINA[dow(selectedDate)] || [];
  if (r.length === 0) { alert('No hay rutina prevista para este día (fin de semana).'); return; }
  const d = ensureDay(selectedDate);
  d.ejercicio = r.map(x => ({actividad:x.a, duracion:x.d, met:x.m}));
  save(); renderHoy();
}

function removeEj(idx) {
  const d = data.dias[selectedDate];
  if (!d) return;
  d.ejercicio.splice(idx, 1);
  save(); renderHoy();
}

function removeFood(cat, idx) {
  const d = data.dias[selectedDate];
  if (!d) return;
  const item = d[cat][idx];
  d[cat].splice(idx, 1);
  if (item && /café/i.test(item.nombre)) d.cafes = Math.max(0, (d.cafes||0) - 1);
  save(); renderHoy();
}

function addPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    alert('La foto es muy grande (>5 MB). Hazla con menos calidad o más pequeña.');
    return;
  }
  // Comprimir a 600px máx, JPEG calidad 0.7
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const maxDim = 600;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = h * maxDim / w; w = maxDim; }
      else if (h > maxDim) { w = w * maxDim / h; h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataURL = canvas.toDataURL('image/jpeg', 0.7);
      const d = ensureDay(selectedDate);
      d.foto = dataURL;
      save(); renderPeso();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function deletePhoto(date) {
  if (!confirm('¿Borrar la foto de '+fmt(date)+'?')) return;
  if (data.dias[date]) {
    data.dias[date].foto = null;
    save(); renderPeso();
  }
}

function openModal(target) {
  modalTarget = target;
  const labels = { desayuno:'Desayuno', comida:'Comida', cena:'Cena', otros:'Otros y tentempiés' };
  document.getElementById('modal-title').textContent = 'Añadir a ' + (labels[target] || target);
  const panel = document.getElementById('panel-rapido');
  panel.innerHTML = '<div class="quick-grid">' + QUICK.map((f,idx) =>
    '<button class="quick" onclick="addQuick('+idx+')">'+
      '<div class="quick-emoji">'+f.e+'</div>'+
      '<div class="quick-name">'+esc(f.n)+'</div>'+
      '<div class="quick-kcal">'+f.k+' kcal</div>'+
    '</button>'
  ).join('') + '</div>';
  document.getElementById('c-nombre').value = '';
  document.getElementById('c-cant').value = '';
  document.getElementById('c-kcal').value = '';
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.dataset.mtab === 'rapido'));
  document.querySelectorAll('.modal-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-rapido'));
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  modalTarget = null;
}

function addQuick(idx) {
  const f = QUICK[idx];
  if (!modalTarget || !f) return;
  const d = ensureDay(selectedDate);
  d[modalTarget].push({nombre:f.n, kcal:f.k, cantidad:f.q});
  if (f.id === 'cafe') d.cafes = (d.cafes||0) + 1;
  save(); renderHoy(); closeModal();
}

function addCustom() {
  if (!modalTarget) return;
  const n = document.getElementById('c-nombre').value.trim();
  const q = document.getElementById('c-cant').value.trim() || '—';
  const k = parseFloat(document.getElementById('c-kcal').value);
  if (!n || isNaN(k)) return;
  const d = ensureDay(selectedDate);
  d[modalTarget].push({nombre:n, kcal:Math.round(k), cantidad:q});
  save(); renderHoy(); closeModal();
}

function goToDate(date) { selectedDate = date; switchTab('hoy'); }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-'+name));
  if (name === 'peso') renderPeso(); // re-renderizar para reiniciar animación
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dieta_export_'+todayKey()+'.json'; a.click();
  URL.revokeObjectURL(url);
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const obj = JSON.parse(ev.target.result);
      if (obj.dias) { data = obj; if (data.factorActividad == null) data.factorActividad = 1.55; save(); renderAll(); alert('Datos importados correctamente'); }
      else alert('El archivo no es válido');
    } catch { alert('Error al leer el archivo'); }
  };
  r.readAsText(file);
}

function resetAll() { if (confirm('¿Está seguro de borrar TODOS los datos? Esta acción no se puede deshacer.')) { data = {dias:{}, factorActividad: 1.55}; save(); renderAll(); } }

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
document.querySelectorAll('.modal-tab').forEach(t => t.addEventListener('click', () => {
  const target = t.dataset.mtab;
  document.querySelectorAll('.modal-tab').forEach(x => x.classList.toggle('active', x.dataset.mtab === target));
  document.querySelectorAll('.modal-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + target));
}));
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.getElementById('info-modal').addEventListener('click', e => { if (e.target.id === 'info-modal') closeInfoModal(); });

load();
renderAll();
</script>
</body>
</html>
