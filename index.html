<!DOCTYPE html>
<html lang="es">
<head>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { background: #0a0d11; overscroll-behavior: none; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #e6e4dc; min-height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
.app { max-width: 480px; margin: 0 auto; padding-bottom: 40px; background: linear-gradient(180deg, #0f1419 0%, #0a0d11 100%); min-height: 100vh; }
header { padding: 20px 20px 8px; display: flex; justify-content: space-between; align-items: flex-end; }
.brand1 { font-family: Georgia, serif; font-size: 28px; font-style: italic; color: #d4b066; line-height: 1; letter-spacing: -0.02em; }
.brand2 { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; margin-top: 4px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #2a2f36; transition: background 0.3s; }
.dot.on { background: #7ab87a; }
.tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 0 12px 8px; border-bottom: 1px solid #1a1f24; }
.tab { background: transparent; border: none; color: #666; padding: 10px 4px; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: inherit; letter-spacing: 0.05em; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab.active { color: #d4b066; border-bottom-color: #d4b066; }
.tab .ico { font-size: 16px; }
main { padding: 12px 16px; }
.date-sel { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 16px; }
.date-btn { background: transparent; border: 1px solid #2a2f36; color: #d4b066; width: 44px; height: 44px; border-radius: 50%; font-size: 22px; cursor: pointer; font-family: inherit; }
.day-name { font-family: Georgia, serif; font-style: italic; font-size: 18px; color: #d4b066; }
.date-txt { font-size: 12px; color: #888; letter-spacing: 0.05em; }
.balance-card { background: linear-gradient(135deg, #161b21 0%, #11161c 100%); border: 1px solid #2a2f36; border-radius: 12px; padding: 18px 18px 16px; margin-bottom: 20px; }
.row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; }
.label { font-size: 13px; color: #aaa; letter-spacing: 0.05em; }
.value { font-size: 15px; color: #e6e4dc; font-family: Georgia, serif; }
.label-s { font-size: 11px; color: #666; padding-left: 12px; }
.value-s { font-size: 12px; color: #888; font-family: Georgia, serif; }
.divider { height: 1px; background: linear-gradient(90deg, transparent, #333, transparent); margin: 10px 0; }
.final-label { font-size: 13px; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; }
.final { font-size: 24px; font-family: Georgia, serif; font-style: italic; letter-spacing: -0.02em; }
.hint { font-size: 11px; color: #888; text-align: right; margin-top: 4px; font-style: italic; }
.section { margin-bottom: 18px; padding: 14px 16px; background: #11161c; border: 1px solid #1a1f24; border-radius: 10px; }
.section-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.section-t { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #aaa; font-weight: 500; }
.btn-add, .btn-small { background: transparent; border: 1px solid #3a3f46; color: #d4b066; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; font-family: inherit; }
.btn-small { padding: 6px 10px; font-size: 11px; }
.item { display: flex; align-items: center; padding: 10px 0; border-top: 1px solid #1a1f24; }
.item-name { font-size: 14px; color: #e6e4dc; }
.item-meta { font-size: 11px; color: #888; margin-top: 2px; }
.btn-x { background: transparent; border: none; color: #666; font-size: 22px; cursor: pointer; width: 32px; height: 32px; font-family: inherit; }
.empty { font-size: 12px; color: #555; font-style: italic; padding: 8px 0; }
.inp { width: 100%; background: #0a0d11; border: 1px solid #2a2f36; border-radius: 8px; padding: 10px 12px; color: #e6e4dc; font-size: 15px; font-family: inherit; margin-top: 6px; margin-bottom: 8px; }
.inp-label { font-size: 11px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-top: 12px; }
.btn-primary { width: 100%; background: #d4b066; color: #0a0d11; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: 0.05em; margin-top: 12px; }
.btn-secondary { width: 100%; background: #2a2f36; color: #d4b066; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px; display: block; text-align: center; }
.btn-danger { width: 100%; background: #3a1f1f; color: #c97070; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; z-index: 100; }
.overlay.hidden { display: none; }
.modal { background: #0f1419; width: 100%; max-width: 480px; margin: 0 auto; border-top: 1px solid #2a2f36; border-radius: 16px 16px 0 0; max-height: 85vh; display: flex; flex-direction: column; }
.modal-h { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1f24; font-family: Georgia, serif; font-style: italic; font-size: 16px; color: #d4b066; }
.modal-close { background: transparent; border: none; color: #888; font-size: 26px; cursor: pointer; font-family: inherit; }
.modal-tabs { display: flex; border-bottom: 1px solid #1a1f24; }
.modal-tab { flex: 1; background: transparent; border: none; color: #666; padding: 12px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; }
.modal-tab.active { color: #d4b066; border-bottom-color: #d4b066; }
.modal-body { padding: 16px 20px 24px; overflow-y: auto; }
.modal-panel { display: none; }
.modal-panel.active { display: block; }
.quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.quick { background: #11161c; border: 1px solid #2a2f36; border-radius: 10px; padding: 14px 8px; color: #e6e4dc; cursor: pointer; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.quick-emoji { font-size: 22px; }
.quick-name { font-size: 12px; text-align: center; line-height: 1.2; }
.quick-kcal { font-size: 11px; color: #d4b066; font-family: Georgia, serif; }
.peso-hero { text-align: center; padding: 24px 0 28px; border-bottom: 1px solid #1a1f24; margin-bottom: 16px; }
.peso-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; }
.peso-value { font-size: 56px; font-family: Georgia, serif; font-style: italic; color: #d4b066; letter-spacing: -0.03em; margin: 6px 0; }
.peso-unit { font-size: 20px; color: #888; font-style: normal; }
.peso-delta { font-size: 13px; }
.peso-delta.down { color: #7ab87a; } .peso-delta.up { color: #c97070; } .peso-delta.same { color: #888; }
.hist-item { width: 100%; text-align: left; background: #11161c; border: 1px solid #1a1f24; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; font-family: inherit; color: #e6e4dc; display: block; }
.hist-day { font-family: Georgia, serif; font-style: italic; font-size: 16px; color: #d4b066; }
.hist-date { font-size: 11px; color: #888; margin-top: 2px; }
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-top: 10px; font-size: 13px; }
.prof-k { font-size: 10px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-right: 6px; }
.prof-v { font-family: Georgia, serif; color: #d4b066; }
.help-text { font-size: 12px; color: #aaa; line-height: 1.6; margin-top: 8px; }
.chart-wrap { height: 240px; margin-top: 16px; position: relative; }
.chart-svg { width: 100%; height: 100%; }
.chart-svg text { fill: #888; font-size: 10px; font-family: -apple-system, sans-serif; }
.chart-svg .grid { stroke: #2a2f36; stroke-dasharray: 2 4; }
.chart-svg .ref { stroke: #666; stroke-dasharray: 4 4; }
.chart-svg .cline { stroke: #d4b066; stroke-width: 2; fill: none; }
.chart-svg .cdot { fill: #d4b066; }
button:active { transform: scale(0.97); }
button { transition: transform 0.1s, background 0.15s, border-color 0.15s; }
input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
.tab-content { display: none; } .tab-content.active { display: block; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="brand1">balance</div>
      <div class="brand2">energético · personal</div>
    </div>
    <div id="save-dot" class="dot" title="guardado"></div>
  </header>
  <nav class="tabs">
    <button class="tab active" data-tab="hoy"><span class="ico">◐</span><span>Hoy</span></button>
    <button class="tab" data-tab="peso"><span class="ico">◑</span><span>Peso</span></button>
    <button class="tab" data-tab="historial"><span class="ico">◧</span><span>Historial</span></button>
    <button class="tab" data-tab="ajustes"><span class="ico">◇</span><span>Ajustes</span></button>
  </nav>
  <main>
    <div id="tab-hoy" class="tab-content active"></div>
    <div id="tab-peso" class="tab-content"></div>
    <div id="tab-historial" class="tab-content"></div>
    <div id="tab-ajustes" class="tab-content"></div>
  </main>
</div>

<div id="modal" class="overlay hidden">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-h">
      <span id="modal-title">añadir</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-mtab="rapido">rápidos</button>
      <button class="modal-tab" data-mtab="custom">personalizado</button>
    </div>
    <div class="modal-body">
      <div id="panel-rapido" class="modal-panel active"></div>
      <div id="panel-custom" class="modal-panel">
        <label class="inp-label">Nombre</label>
        <input class="inp" id="c-nombre" placeholder="ej. Filete ternera">
        <label class="inp-label">Cantidad / descripción</label>
        <input class="inp" id="c-cant" placeholder="ej. 150g a la plancha">
        <label class="inp-label">kcal estimadas</label>
        <input class="inp" id="c-kcal" type="number" inputmode="numeric" placeholder="ej. 250">
        <button class="btn-primary" onclick="addCustom()">Añadir</button>
      </div>
    </div>
  </div>
</div>

<script>
const PERFIL = { sexo: 'M', edad: 47, altura: 188, pesoInicial: 95, factorActividad: 1.55 };
const tmb = p => Math.round(10*p + 6.25*PERFIL.altura - 5*PERFIL.edad + 5);
const get = p => Math.round(tmb(p) * PERFIL.factorActividad);

const QUICK = [
  { id:'naranja', n:'Naranja', k:70, e:'🍊', q:'1 ud (~150g)' },
  { id:'banana_m', n:'½ Banana grande', k:67, e:'🍌', q:'~75g' },
  { id:'banana', n:'Banana entera', k:135, e:'🍌', q:'~150g' },
  { id:'tostada', n:'Tostada pan semillas', k:90, e:'🍞', q:'10mm ~33g' },
  { id:'aove', n:'AOVE (cucharadita)', k:45, e:'🫒', q:'~5ml' },
  { id:'aove_b', n:'AOVE (cuchara)', k:90, e:'🫒', q:'~10ml' },
  { id:'cafe', n:'Café leche desnat.', k:24, e:'☕', q:'200ml (60ml leche)' },
  { id:'manzana', n:'Manzana', k:80, e:'🍎', q:'1 ud (~180g)' },
  { id:'huevo', n:'Huevo cocido', k:75, e:'🥚', q:'1 ud' },
  { id:'pollo', n:'Pollo plancha', k:165, e:'🍗', q:'100g' },
  { id:'arroz', n:'Arroz cocido', k:130, e:'🍚', q:'100g' },
  { id:'yogur', n:'Yogur natural', k:60, e:'🥛', q:'125g' },
];

const RUTINA = {
  1:[{a:'HIT',d:30,m:8.5},{a:'FITPOWER',d:55,m:6.5}],
  2:[{a:'Bike',d:30,m:10.0},{a:'BODYBOX',d:55,m:7.5}],
  3:[{a:'Bike',d:30,m:10.0},{a:'HIT',d:45,m:8.5}],
  4:[{a:'BODY SPAR',d:55,m:12.0},{a:'BODYBOX',d:55,m:7.5}],
  5:[{a:'GAP',d:30,m:5.5},{a:'Bike',d:30,m:10.0}],
  0:[], 6:[],
};

const kcalEjer = (met, dur, peso) => Math.round((met-1) * peso * dur / 60);
const SK = 'dieta_data_v1';
const todayKey = () => new Date().toISOString().slice(0,10);
const fmt = k => { const [y,m,d] = k.split('-'); return d+'/'+m+'/'+y.slice(2); };
const dayName = k => ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][new Date(k+'T12:00:00').getDay()];
const dow = k => new Date(k+'T12:00:00').getDay();
const empty = () => ({ desayuno:[], comida:[], cena:[], otros:[], ejercicio:[], peso:null, cafes:0 });

let data = { dias: {} };
let selectedDate = todayKey();
let modalTarget = null;

function load() {
  try { const raw = localStorage.getItem(SK); if (raw) data = JSON.parse(raw); } catch {}
  if (!data.dias) data.dias = {};
  if (!data.dias['2026-05-14']) {
    data.dias['2026-05-14'] = {
      ...empty(), peso: 95, cafes: 2,
      desayuno: [
        {nombre:'Naranja',kcal:70,cantidad:'1 ud'},
        {nombre:'½ Banana grande',kcal:67,cantidad:'~75g'},
        {nombre:'Tostada pan semillas',kcal:90,cantidad:'10mm ~33g'},
        {nombre:'Tostada pan semillas',kcal:90,cantidad:'10mm ~33g'},
        {nombre:'AOVE',kcal:45,cantidad:'~5ml'},
        {nombre:'Café c/ leche desnatada',kcal:24,cantidad:'200ml'},
      ],
      otros: [{nombre:'Café c/ leche desnatada',kcal:24,cantidad:'200ml'}],
      ejercicio: [{actividad:'BODY SPAR',duracion:55,met:12.0},{actividad:'BODYBOX',duracion:55,met:7.5}],
    };
  }
}

function save() {
  try { localStorage.setItem(SK, JSON.stringify(data)); } catch {}
  const dot = document.getElementById('save-dot');
  dot.classList.add('on');
  setTimeout(() => dot.classList.remove('on'), 600);
}

function ensureDay(k) { if (!data.dias[k]) data.dias[k] = empty(); return data.dias[k]; }

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

function renderHoy() {
  const d = data.dias[selectedDate] || empty();
  const peso = d.peso || PERFIL.pesoInicial;
  const getB = get(peso);
  const sum = arr => arr.reduce((s,x) => s + (x.kcal||0), 0);
  const kIn = { desayuno:sum(d.desayuno), comida:sum(d.comida), cena:sum(d.cena), otros:sum(d.otros) };
  kIn.total = kIn.desayuno + kIn.comida + kIn.cena + kIn.otros;
  const kEj = d.ejercicio.reduce((s,e) => s + kcalEjer(e.met, e.duracion, peso), 0);
  const gasto = getB + kEj;
  const bal = kIn.total - gasto;
  const balCol = bal < 0 ? '#7ab87a' : bal > 200 ? '#c97070' : '#d4b066';
  let hint = bal < -500 ? '🔥 déficit fuerte' : bal < 0 ? '✓ déficit saludable' : bal < 300 ? '≈ mantenimiento' : '↑ superávit';

  const renderItems = (cat, items) => items.map((it,i) =>
    '<div class="item"><div style="flex:1"><div class="item-name">'+esc(it.nombre)+'</div><div class="item-meta">'+esc(it.cantidad)+' · '+it.kcal+' kcal</div></div><button class="btn-x" onclick="removeFood(\''+cat+'\','+i+')">×</button></div>'
  ).join('');

  const renderEj = d.ejercicio.map((e,i) =>
    '<div class="item"><div style="flex:1"><div class="item-name">'+esc(e.actividad)+'</div><div class="item-meta">'+e.duracion+' min · MET '+e.met+' · '+kcalEjer(e.met,e.duracion,peso)+' kcal</div></div><button class="btn-x" onclick="removeEj('+i+')">×</button></div>'
  ).join('');

  const comidaSec = (key, lbl) =>
    '<div class="section"><div class="section-h"><span class="section-t">'+lbl+' · '+kIn[key]+' kcal</span><button class="btn-add" onclick="openModal(\''+key+'\')">+ añadir</button></div>'+
    (d[key].length === 0 ? '<div class="empty">vacío</div>' : renderItems(key, d[key]))+'</div>';

  document.getElementById('tab-hoy').innerHTML =
    '<div class="date-sel"><button class="date-btn" onclick="changeDate(-1)">‹</button>'+
    '<div style="text-align:center"><div class="day-name">'+dayName(selectedDate)+'</div><div class="date-txt">'+fmt(selectedDate)+'</div></div>'+
    '<button class="date-btn" onclick="changeDate(1)">›</button></div>'+
    '<div class="balance-card">'+
      '<div class="row"><span class="label">Ingesta</span><span class="value">'+kIn.total.toLocaleString('es')+' kcal</span></div>'+
      '<div class="row"><span class="label">Gasto total</span><span class="value">'+gasto.toLocaleString('es')+' kcal</span></div>'+
      '<div class="row"><span class="label-s">· basal × actividad</span><span class="value-s">'+getB.toLocaleString('es')+'</span></div>'+
      '<div class="row"><span class="label-s">· gimnasio</span><span class="value-s">'+kEj.toLocaleString('es')+'</span></div>'+
      '<div class="divider"></div>'+
      '<div class="row"><span class="final-label">Balance</span><span class="final" style="color:'+balCol+'">'+(bal>0?'+':'')+bal.toLocaleString('es')+' kcal</span></div>'+
      '<div class="hint">'+hint+'</div>'+
    '</div>'+
    '<div class="section"><label class="section-t">Peso de hoy (kg)</label>'+
      '<input class="inp" type="number" step="0.1" inputmode="decimal" placeholder="'+PERFIL.pesoInicial+'" value="'+(d.peso ?? '')+'" onchange="setPeso(this.value)"></div>'+
    comidaSec('desayuno','Desayuno')+
    comidaSec('comida','Comida')+
    comidaSec('cena','Cena')+
    comidaSec('otros','Otros / snacks')+
    '<div class="section"><div class="section-h"><span class="section-t">Gimnasio · '+kEj+' kcal</span><button class="btn-small" onclick="loadRutina()">cargar rutina</button></div>'+
    (d.ejercicio.length === 0 ? '<div class="empty">sin entreno</div>' : renderEj)+'</div>';
}

function renderPeso() {
  const series = Object.entries(data.dias).filter(([_,d]) => d.peso != null).map(([k,d]) => ({fecha:fmt(k), peso:d.peso, raw:k})).sort((a,b) => a.raw.localeCompare(b.raw));
  const ult = series.length > 0 ? series[series.length-1].peso : PERFIL.pesoInicial;
  const delta = +(ult - PERFIL.pesoInicial).toFixed(1);
  const deltaCls = delta < 0 ? 'down' : delta > 0 ? 'up' : 'same';

  let chart = '<div class="empty" style="padding:80px 0;text-align:center">añade al menos 2 pesos para ver la gráfica</div>';
  if (series.length >= 2) {
    const W = 400, H = 220, PAD = 36;
    const ys = series.map(s => s.peso);
    const minY = Math.min(...ys, PERFIL.pesoInicial) - 0.5;
    const maxY = Math.max(...ys, PERFIL.pesoInicial) + 0.5;
    const xStep = (W - 2*PAD) / Math.max(1, series.length - 1);
    const scaleY = v => H - PAD - ((v - minY) / (maxY - minY)) * (H - 2*PAD);
    const path = series.map((s,i) => (i===0?'M':'L')+' '+(PAD + i*xStep)+' '+scaleY(s.peso)).join(' ');
    const dots = series.map((s,i) => '<circle class="cdot" cx="'+(PAD + i*xStep)+'" cy="'+scaleY(s.peso)+'" r="4"/>').join('');
    const step = Math.max(1, Math.ceil(series.length/6));
    const labels = series.map((s,i) => {
      if (i % step !== 0 && i !== series.length-1) return '';
      return '<text x="'+(PAD + i*xStep)+'" y="'+(H-10)+'" text-anchor="middle">'+s.fecha+'</text>';
    }).join('');
    const refY = scaleY(PERFIL.pesoInicial);
    const yMarks = [minY, (minY+maxY)/2, maxY].map(v =>
      '<line class="grid" x1="'+PAD+'" y1="'+scaleY(v)+'" x2="'+(W-PAD)+'" y2="'+scaleY(v)+'"/>'+
      '<text x="'+(PAD-4)+'" y="'+(scaleY(v)+3)+'" text-anchor="end">'+v.toFixed(1)+'</text>'
    ).join('');
    chart = '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
      yMarks+
      '<line class="ref" x1="'+PAD+'" y1="'+refY+'" x2="'+(W-PAD)+'" y2="'+refY+'"/>'+
      '<path class="cline" d="'+path+'"/>'+dots+labels+
    '</svg>';
  }

  document.getElementById('tab-peso').innerHTML =
    '<div class="peso-hero"><div class="peso-label">peso actual</div>'+
    '<div class="peso-value">'+ult+' <span class="peso-unit">kg</span></div>'+
    '<div class="peso-delta '+deltaCls+'">'+(delta>0?'+':'')+delta+' kg desde inicio</div></div>'+
    '<div class="section"><label class="section-t">Evolución</label><div class="chart-wrap">'+chart+'</div></div>'+
    '<div class="section"><label class="section-t">Histórico ('+series.length+' registros)</label>'+
    series.slice().reverse().map(s =>
      '<div class="item"><div style="flex:1"><div class="item-name">'+s.fecha+'</div></div><div style="font-family:Georgia,serif;font-size:16px;color:#d4b066">'+s.peso+' kg</div></div>'
    ).join('')+'</div>';
}

function renderHistorial() {
  const dias = Object.entries(data.dias).map(([k,d]) => {
    const ingesta = ['desayuno','comida','cena','otros'].reduce((s,c) => s + d[c].reduce((ss,x) => ss + (x.kcal||0), 0), 0);
    const peso = d.peso || PERFIL.pesoInicial;
    const ejer = d.ejercicio.reduce((s,e) => s + kcalEjer(e.met,e.duracion,peso), 0);
    const gasto = get(peso) + ejer;
    return {fecha:k, ingesta, gasto, balance:ingesta-gasto, peso:d.peso};
  }).sort((a,b) => b.fecha.localeCompare(a.fecha));

  document.getElementById('tab-historial').innerHTML = dias.length === 0
    ? '<div class="empty" style="margin-top:40px;text-align:center">sin registros aún</div>'
    : dias.map(d => {
        const col = d.balance < 0 ? '#7ab87a' : d.balance > 200 ? '#c97070' : '#d4b066';
        return '<button class="hist-item" onclick="goToDate(\''+d.fecha+'\')">'+
          '<div style="display:flex;justify-content:space-between;align-items:baseline">'+
            '<div><div class="hist-day">'+dayName(d.fecha)+'</div><div class="hist-date">'+fmt(d.fecha)+'</div></div>'+
            '<div style="text-align:right">'+
              '<div style="font-size:16px;font-family:Georgia,serif;color:'+col+'">'+(d.balance>0?'+':'')+d.balance.toLocaleString('es')+'</div>'+
              '<div style="font-size:10px;color:#888">in '+d.ingesta+' · gas '+d.gasto+(d.peso?' · '+d.peso+'kg':'')+'</div>'+
            '</div></div></button>';
      }).join('');
}

function renderAjustes() {
  document.getElementById('tab-ajustes').innerHTML =
    '<div class="section"><div class="section-t">Perfil</div><div class="profile-grid">'+
    '<div><span class="prof-k">sexo</span> <span class="prof-v">Varón</span></div>'+
    '<div><span class="prof-k">edad</span> <span class="prof-v">'+PERFIL.edad+'</span></div>'+
    '<div><span class="prof-k">altura</span> <span class="prof-v">'+PERFIL.altura+' cm</span></div>'+
    '<div><span class="prof-k">TMB</span> <span class="prof-v">'+tmb(PERFIL.pesoInicial)+' kcal</span></div>'+
    '<div><span class="prof-k">GET</span> <span class="prof-v">'+get(PERFIL.pesoInicial)+' kcal</span></div>'+
    '<div><span class="prof-k">peso ini.</span> <span class="prof-v">'+PERFIL.pesoInicial+' kg</span></div>'+
    '</div></div>'+
    '<div class="section"><div class="section-t">Datos</div>'+
    '<button class="btn-primary" onclick="exportJSON()">Exportar JSON</button>'+
    '<label class="btn-secondary">Importar JSON<input type="file" accept=".json,application/json" onchange="importJSON(event)" style="display:none"></label>'+
    '<button class="btn-danger" onclick="resetAll()">Borrar todo</button></div>'+
    '<div class="section"><div class="section-t">Acerca de</div><p class="help-text">App offline. Los datos se guardan en este dispositivo. Para sincronizar con otro móvil, exporta JSON e importa en el otro.</p></div>'+
    '<div class="section" style="opacity:0.5;font-size:11px;text-align:center;padding:16px">balance energético · v1.0</div>';
}

function renderAll() { renderHoy(); renderPeso(); renderHistorial(); renderAjustes(); }

function changeDate(delta) {
  const d = new Date(selectedDate+'T12:00:00');
  d.setDate(d.getDate() + delta);
  selectedDate = d.toISOString().slice(0,10);
  renderHoy();
}

function setPeso(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return;
  const d = ensureDay(selectedDate);
  d.peso = n;
  save(); renderAll();
}

function loadRutina() {
  const r = RUTINA[dow(selectedDate)] || [];
  if (r.length === 0) { alert('No hay rutina para este día (fin de semana).'); return; }
  const d = ensureDay(selectedDate);
  d.ejercicio = r.map(x => ({actividad:x.a, duracion:x.d, met:x.m}));
  save(); renderHoy();
}

function removeEj(idx) {
  const d = data.dias[selectedDate];
  if (!d) return;
  d.ejercicio.splice(idx, 1);
  save(); renderHoy();
}

function removeFood(cat, idx) {
  const d = data.dias[selectedDate];
  if (!d) return;
  const item = d[cat][idx];
  d[cat].splice(idx, 1);
  if (item && /café/i.test(item.nombre)) d.cafes = Math.max(0, (d.cafes||0) - 1);
  save(); renderHoy();
}

function openModal(target) {
  modalTarget = target;
  document.getElementById('modal-title').textContent = 'añadir a ' + target;
  const panel = document.getElementById('panel-rapido');
  panel.innerHTML = '<div class="quick-grid">' + QUICK.map((f,idx) =>
    '<button class="quick" onclick="addQuick('+idx+')">'+
      '<div class="quick-emoji">'+f.e+'</div>'+
      '<div class="quick-name">'+esc(f.n)+'</div>'+
      '<div class="quick-kcal">'+f.k+' kcal</div>'+
    '</button>'
  ).join('') + '</div>';
  document.getElementById('c-nombre').value = '';
  document.getElementById('c-cant').value = '';
  document.getElementById('c-kcal').value = '';
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.dataset.mtab === 'rapido'));
  document.querySelectorAll('.modal-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-rapido'));
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  modalTarget = null;
}

function addQuick(idx) {
  const f = QUICK[idx];
  if (!modalTarget || !f) return;
  const d = ensureDay(selectedDate);
  d[modalTarget].push({nombre:f.n, kcal:f.k, cantidad:f.q});
  if (f.id === 'cafe') d.cafes = (d.cafes||0) + 1;
  save(); renderHoy(); closeModal();
}

function addCustom() {
  if (!modalTarget) return;
  const n = document.getElementById('c-nombre').value.trim();
  const q = document.getElementById('c-cant').value.trim() || '—';
  const k = parseFloat(document.getElementById('c-kcal').value);
  if (!n || isNaN(k)) return;
  const d = ensureDay(selectedDate);
  d[modalTarget].push({nombre:n, kcal:Math.round(k), cantidad:q});
  save(); renderHoy(); closeModal();
}

function goToDate(date) { selectedDate = date; switchTab('hoy'); }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-'+name));
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dieta_export_'+todayKey()+'.json'; a.click();
  URL.revokeObjectURL(url);
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const obj = JSON.parse(ev.target.result);
      if (obj.dias) { data = obj; save(); renderAll(); alert('Importado correctamente'); }
      else alert('Archivo no válido');
    } catch { alert('Error leyendo el archivo'); }
  };
  r.readAsText(file);
}

function resetAll() { if (confirm('¿Borrar TODOS los datos?')) { data = {dias:{}}; save(); renderAll(); } }

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
document.querySelectorAll('.modal-tab').forEach(t => t.addEventListener('click', () => {
  const target = t.dataset.mtab;
  document.querySelectorAll('.modal-tab').forEach(x => x.classList.toggle('active', x.dataset.mtab === target));
  document.querySelectorAll('.modal-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + target));
}));
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

load();
renderAll();
</script>
</body>
</html>
